name: Product CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: product-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shared-and-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Test shared product core
        run: ./gradlew :shared:testDebugUnitTest

      - name: Build Android debug APK and JavaScript package
        run: ./gradlew :apps:android:assembleDebug :shared:jsBrowserProductionLibraryDistribution

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: shared/build/reports/tests/

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: futureme-financial-debug
          path: apps/android/build/outputs/apk/debug/android-debug.apk

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Build shared Kotlin/JS package
        run: ./gradlew :shared:jsBrowserProductionLibraryDistribution

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Test and build web
        working-directory: apps/web
        run: npm test && npm run build

  ios:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Compile shared iOS target
        run: ./gradlew :shared:compileKotlinIosSimulatorArm64

      - name: Build iOS simulator app
        run: >
          xcodebuild
          -project apps/ios/FutureMeFinancial.xcodeproj
          -scheme FutureMeFinancial
          -sdk iphonesimulator
          -configuration Debug
          CODE_SIGNING_ALLOWED=NO
          build
